<style>
  

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F2EFE9;
    --border: #E0DAD0;
    --border2: #C8C0B4;
    --text: #1C1A17;
    --text2: #6B6560;
    --text3: #9E9891;
    --accent: #2B5EA7;
    --accent-bg: #EAF0FA;
    --accent-border: #B0C8EE;
    --high: #C0392B;
    --high-bg: #FDECEA;
    --med: #C47A1A;
    --med-bg: #FDF3E3;
    --low: #2E7D32;
    --low-bg: #E8F5E9;
    --done: #5A8A5A;
    --done-bg: #EEF6EE;
    --red: #C0392B;
    --red-bg: #FDECEA;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .header-top { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }

  .header-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .header-sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-weight: 300;
  }

  .btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1e4d8c; border-color: #1e4d8c; }
  .btn-danger { background: var(--red-bg); color: var(--red); border-color: #f0b0aa; }
  .btn-danger:hover { background: #f9d5d2; }
  .btn-sm { font-size: 12px; padding: 5px 12px; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    text-align: center;
  }
  .stat-val { font-size: 24px; font-weight: 600; color: var(--text); font-family: Georgia, 'Times New Roman', serif; }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

  .controls-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 16px;
  }

  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  .search-input {
    width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14px;
    padding: 8px 12px 8px 34px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
  .search-input:focus { border-color: var(--accent); }

  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .pill:hover { background: var(--surface2); }
  .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .main { max-width: 800px; margin: 0 auto; padding: 20px 16px 60px; }

  .add-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    display: none;
  }
  .add-panel.open { display: block; }
  .add-panel label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px; }
  .add-panel textarea {
    width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    resize: vertical;
    min-height: 80px;
    outline: none;
  }
  .add-panel textarea:focus { border-color: var(--accent); background: var(--surface); }
  .add-panel select {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    outline: none;
  }

  .cat-section { margin-bottom: 24px; }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    user-select: none;
    margin-bottom: 6px;
    transition: background 0.15s;
  }
  .cat-header:hover { background: var(--surface2); }
  .cat-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { font-family: Georgia, 'Times New Roman', serif; font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
  .cat-progress { font-size: 12px; color: var(--text3); }
  .cat-chevron { font-size: 11px; color: var(--text3); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  .task-list { display: flex; flex-direction: column; gap: 5px; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .task-card:hover { border-color: var(--border2); box-shadow: var(--shadow); }
  .task-card.expanded { border-color: var(--accent-border); box-shadow: 0 2px 8px rgba(43,94,167,0.1); }
  .task-card.is-done { opacity: 0.6; }

  .task-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    cursor: pointer;
  }

  .check-btn {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    cursor: pointer;
    background: var(--surface);
    transition: all 0.15s;
    color: transparent;
  }
  .check-btn:hover { border-color: var(--done); }
  .task-card.is-done .check-btn { background: var(--done-bg); border-color: var(--done); color: var(--done); }

  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 14px; color: var(--text); line-height: 1.45; }
  .task-card.is-done .task-text { text-decoration: line-through; color: var(--text3); }
  .task-snippet { font-size: 12px; color: var(--text3); margin-top: 3px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-due { font-size: 11px; font-weight: 600; color: var(--med); margin-top: 2px; }
  .task-due.overdue { color: var(--high); }

  .task-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .done-stamp { font-size: 11px; color: var(--text3); }
  .p-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .p-high { background: var(--high-bg); color: var(--high); }
  .p-med { background: var(--med-bg); color: var(--med); }
  .p-low { background: var(--low-bg); color: var(--low); }
  .expand-chevron { font-size: 11px; color: var(--text3); }

  .task-detail {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    background: var(--accent-bg);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .detail-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }

  .detail-textarea {
    width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 13px;
    padding: 9px 11px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    resize: vertical;
    min-height: 80px;
    outline: none;
    line-height: 1.5;
  }
  .detail-textarea:focus { border-color: var(--accent); }

  .detail-input {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    outline: none;
    width: 100%;
  }
  .detail-input:focus { border-color: var(--accent); }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .detail-grid { grid-template-columns: 1fr; } }

  .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding-top: 4px; }

  .empty-state { font-size: 13px; color: var(--text3); padding: 12px 14px; font-style: italic; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .header { padding: 14px 16px 12px; }
    .header-title { font-size: 18px; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .task-right { flex-direction: column; align-items: flex-end; gap: 4px; }
  }
</style>
</head>

</div>

let tasks, expanded = {}, collapsed = {}, filter = 'all';

function load() {
  try {
    const s = localStorage.getItem('jim_list_2026_v5');
    tasks = s ? JSON.parse(s) : SEED.map(t => ({...t}));
  } catch(e) { tasks = SEED.map(t => ({...t})); }
}

function save() {
  try {
    localStorage.setItem('jim_list_2026_v5', JSON.stringify(tasks));
    const now = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit'});
    document.getElementById('lastSaved').textContent = now;
  } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function toggleAdd() {
  document.getElementById('addPanel').classList.toggle('open');
}

function addItems() {
  const raw = document.getElementById('noteInput').value.trim();
  if (!raw) return;
  const cat = document.getElementById('newCat').value;
  const priority = document.getElementById('newPri').value;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  let maxId = Math.max(...tasks.map(t => t.id), 200);
  lines.forEach(line => tasks.push({id:++maxId, cat, text:line, priority, done:false, doneDate:null, note:'', due:''}));
  save(); render();
  document.getElementById('noteInput').value = '';
  document.getElementById('addPanel').classList.remove('open');
  showToast(`${lines.length} item${lines.length>1?'s':''} added`);
}

function toggleDone(id, e) {
  if (e) e.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  t.doneDate = t.done ? new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : null;
  save(); render();
  showToast(t.done ? 'Marked complete ✓' : 'Marked active');
}

function toggleExpand(id) {
  expanded[id] = !expanded[id];
  render();
}

function saveNote(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const n = document.getElementById('note_'+id);
  const d = document.getElementById('due_'+id);
  const p = document.getElementById('pri_'+id);
  if (n) t.note = n.value;
  if (d) t.due = d.value;
  if (p) t.priority = p.value;
  save();
  expanded[id] = false;
  render();
  showToast('Saved');
}

function deleteTask(id) {
  if (!confirm('Delete this item? This cannot be undone.')) return;
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
  showToast('Item deleted');
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleCollapse(cat) {
  collapsed[cat] = !collapsed[cat];
  render();
}

function isOverdue(due) {
  if (!due) return false;
  return new Date(due) < new Date(new Date().toDateString());
}

function formatDue(due) {
  if (!due) return '';
  const d = new Date(due + 'T00:00:00');
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function render() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const high = tasks.filter(t => t.priority === 'high' && !t.done).length;
  const noted = tasks.filter(t => t.note && t.note.trim()).length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-val">${total - done}</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-val">${done}</div><div class="stat-label">Done</div></div>
    <div class="stat"><div class="stat-val">${high}</div><div class="stat-label">High priority</div></div>
    <div class="stat"><div class="stat-val">${noted}</div><div class="stat-label">Notes</div></div>
  `;

  let html = '';

  CATS.forEach(cat => {
    let items = tasks.filter(t => t.cat === cat.name);
    if (q) items = items.filter(t => t.text.toLowerCase().includes(q) || (t.note && t.note.toLowerCase().includes(q)));
    if (filter === 'active') items = items.filter(t => !t.done);
    if (filter === 'done') items = items.filter(t => t.done);
    if (filter === 'high') items = items.filter(t => t.priority === 'high' && !t.done);
    if (filter === 'noted') items = items.filter(t => t.note && t.note.trim());
    if (filter === 'due') items = items.filter(t => t.due && !t.done);

    const isCol = collapsed[cat.name];
    const catDone = items.filter(t => t.done).length;
    const pct = items.length ? Math.round((catDone / items.length) * 100) : 0;

    if (!items.length) {
      html += `<div class="cat-section">
        <div class="cat-header" onclick="toggleCollapse('${cat.name.replace(/&/g,'&amp;')}')">
          <div class="cat-dot" style="background:${cat.color}"></div>
          <span class="cat-name">${cat.name}</span>
          <span class="cat-progress">0 of 0 done</span>
          <span class="cat-chevron">${isCol ? '▶' : '▼'}</span>
        </div>
        ${!isCol ? '<div class="empty-state">No items yet — use + Add Items above to add your first one.</div>' : ''}
      </div>`;
      return;
    }

    html += `<div class="cat-section">
      <div class="cat-header" onclick="toggleCollapse('${cat.name.replace(/&/g,'&amp;')}')">
        <div class="cat-dot" style="background:${cat.color}"></div>
        <span class="cat-name">${cat.name}</span>
        <span class="cat-progress">${catDone} of ${items.length} done</span>
        <span class="cat-chevron">${isCol ? '▶' : '▼'}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${cat.color};"></div></div>`;

    if (!isCol) {
      html += `<div class="task-list">`;
      items.forEach(t => {
        const isExp = expanded[t.id];
        const pbadge = `p-${t.priority}`;
        const ptext = t.priority === 'high' ? 'High' : t.priority === 'med' ? 'Med' : 'Low';
        const snippet = t.note ? t.note.substring(0, 70) + (t.note.length > 70 ? '…' : '') : '';
        const dueLabel = t.due && !t.done ? `Due: ${formatDue(t.due)}` : '';
        const overdue = t.due && !t.done && isOverdue(t.due);

        html += `<div class="task-card ${t.done ? 'is-done' : ''} ${isExp ? 'expanded' : ''}">
          <div class="task-row" onclick="toggleExpand(${t.id})">
            <div class="check-btn" onclick="toggleDone(${t.id}, event)" title="Mark complete">${t.done ? '✓' : ''}</div>
            <div class="task-body">
              <div class="task-text">${t.text}</div>
              ${snippet ? `<div class="task-snippet">${snippet}</div>` : ''}
              ${dueLabel ? `<div class="task-due ${overdue ? 'overdue' : ''}">${overdue ? '⚠ ' : ''}${dueLabel}</div>` : ''}
            </div>
            <div class="task-right">
              ${t.doneDate ? `<span class="done-stamp">${t.doneDate}</span>` : `<span class="p-badge ${pbadge}">${ptext}</span>`}
              <span class="expand-chevron">${isExp ? '▲' : '▼'}</span>
            </div>
          </div>`;

        if (isExp) {
          html += `<div class="task-detail">
            <div>
              <div class="detail-label">Notes</div>
              <textarea class="detail-textarea" id="note_${t.id}" placeholder="Add notes, context, next steps, phone numbers, follow-up details...">${t.note || ''}</textarea>
            </div>
            <div class="detail-grid">
              <div>
                <div class="detail-label">Due date</div>
                <input class="detail-input" type="date" id="due_${t.id}" value="${t.due || ''}" />
              </div>
              <div>
                <div class="detail-label">Priority</div>
                <select class="detail-input" id="pri_${t.id}">
                  <option value="high" ${t.priority === 'high' ? 'selected' : ''}>High</option>
                  <option value="med" ${t.priority === 'med' ? 'selected' : ''}>Medium</option>
                  <option value="low" ${t.priority === 'low' ? 'selected' : ''}>Low</option>
                </select>
              </div>
            </div>
            <div class="detail-actions">
              <button class="btn btn-primary btn-sm" onclick="saveNote(${t.id})">Save</button>
              <button class="btn btn-sm" onclick="toggleDone(${t.id}, event)">${t.done ? 'Mark active' : 'Mark done'}</button>
              <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">Delete</button>
            </div>
          </div>`;
        }

        html += `</div>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  });

  document.getElementById('container').innerHTML = html;
}

load();
render();
</script>
</body>
</html>
